name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'

env:
  SUPABASE_PROJECT_REF: oduglbxjcmmdexwplzvw
  SUPABASE_CLI_VERSION: 2.86.0

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Detect & Deploy Edge Functions
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Detect changed functions
        id: detect
        run: |
          # Find functions to deploy.
          # If anything in _shared/ changed, redeploy all functions.
          # Otherwise, only deploy folders with changes.

          CHANGED=$(git diff --name-only HEAD^ HEAD -- 'supabase/functions/' || git ls-files 'supabase/functions/')

          if echo "$CHANGED" | grep -q '^supabase/functions/_shared/'; then
            echo "_shared/ changed â†’ redeploying ALL functions"
            FUNCTIONS=$(ls -1 supabase/functions/ | grep -v '^_shared$' | grep -v '^deno.json$' | xargs)
          else
            FUNCTIONS=$(echo "$CHANGED" | sed -n 's|^supabase/functions/\([^/]*\)/.*|\1|p' | grep -v '^_shared$' | sort -u | xargs)
          fi

          if [ -z "$FUNCTIONS" ]; then
            echo "No functions to deploy"
            echo "functions=" >> "$GITHUB_OUTPUT"
          else
            echo "Will deploy: $FUNCTIONS"
            echo "functions=$FUNCTIONS" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy functions
        if: steps.detect.outputs.functions != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "ERROR: SUPABASE_ACCESS_TOKEN secret is not set in GitHub repository settings"
            exit 1
          fi

          for fn in ${{ steps.detect.outputs.functions }}; do
            echo "::group::Deploying $fn"
            npx supabase@${{ env.SUPABASE_CLI_VERSION }} functions deploy "$fn" \
              --project-ref ${{ env.SUPABASE_PROJECT_REF }} \
              --no-verify-jwt
            echo "::endgroup::"
          done

      - name: Summary
        if: always()
        run: |
          if [ -z "${{ steps.detect.outputs.functions }}" ]; then
            echo "âś… No Edge Functions to deploy" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## âś… Deployed Edge Functions" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            for fn in ${{ steps.detect.outputs.functions }}; do
              echo "- \`$fn\`" >> "$GITHUB_STEP_SUMMARY"
            done
          fi
